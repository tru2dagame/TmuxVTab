name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v5

      - name: Build (${{ matrix.arch }})
        run: |
          swift build -c release --arch ${{ matrix.arch }}
          cp .build/release/TmuxVTab TmuxVTab-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v5
        with:
          name: TmuxVTab-darwin-${{ matrix.arch }}
          path: TmuxVTab-darwin-${{ matrix.arch }}

  release:
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create universal binary
        run: |
          lipo -create \
            artifacts/TmuxVTab-darwin-arm64/TmuxVTab-darwin-arm64 \
            artifacts/TmuxVTab-darwin-x86_64/TmuxVTab-darwin-x86_64 \
            -output TmuxVTab-darwin-universal
          chmod +x TmuxVTab-darwin-universal TmuxVTab-darwin-arm64/TmuxVTab-darwin-arm64 TmuxVTab-darwin-x86_64/TmuxVTab-darwin-x86_64 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/TmuxVTab-darwin-arm64/TmuxVTab-darwin-arm64 \
            artifacts/TmuxVTab-darwin-x86_64/TmuxVTab-darwin-x86_64 \
            TmuxVTab-darwin-universal
